apiVersion: apps/v1
kind: Deployment
metadata:
  name: jd-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: jd-app
  template:
    metadata:
      labels:
        app: jd-app
    spec:
      containers:
      - name: jd-container
        image: jdacr12345.azurecr.io/jdapp:latest
        ports:
        - containerPort: 80